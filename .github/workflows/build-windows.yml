name: Build Windows Executable

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 0.8.1)'
        required: false
        default: ''
  
  # 推送 tag 时自动触发
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x64'
    
    - name: Install UPX
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip" -OutFile "upx.zip"
        Expand-Archive -Path "upx.zip" -DestinationPath "upx"
        echo "UPX_DIR=$((Get-Item .).FullName)\\upx\\upx-4.2.4-win64" | Out-File -FilePath $env:GITHUB_ENV -Append
        $upxPath = "$((Get-Item .).FullName)\\upx\\upx-4.2.4-win64\\upx.exe"
        & $upxPath --version
    
    - name: Install dependencies
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build executable
      shell: pwsh
      run: |
        pyinstaller rpa_tool.spec --clean --upx-dir $env:UPX_DIR
    
    - name: Check build output
      shell: pwsh
      run: |
        dir dist
        if (Test-Path "dist/RPA自动化工具.exe") {
          echo "Build successful!"
          dir "dist/RPA自动化工具.exe"
        } else {
          echo "Build failed!"
          exit 1
        }
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: RPA自动化工具-Windows
        path: dist/RPA自动化工具.exe
        retention-days: 30
    
    - name: Create Release (only on tags)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/RPA自动化工具.exe
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
